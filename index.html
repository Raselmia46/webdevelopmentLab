<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBSTU STORE | Premium E-Commerce</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"></div>

  <!-- Splash Screen Login -->
  <div class="auth-wrapper align-items-center justify-content-center p-4">
    <div class="auth-card mx-auto">
      <div class="text-center mb-4">
        <h1 class="fw-bolder" style="color:var(--primary-color); letter-spacing:-1px;">MBSTU STORE.</h1>
        <p class="text-muted fw-semibold">Access the commercial portal.</p>
      </div>
      
      <div id="login-form-container">
        <form onsubmit="login(event)">
          <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <div class="input-group shadow-sm border-0 rounded-3 overflow-hidden">
              <span class="input-group-text bg-white border-0"><i class="bi bi-person text-primary"></i></span>
              <input type="text" id="username" class="form-control border-0 bg-white py-2" placeholder="Enter username" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <div class="input-group shadow-sm border-0 rounded-3 overflow-hidden">
              <span class="input-group-text bg-white border-0"><i class="bi bi-lock text-primary"></i></span>
              <input type="password" id="password" class="form-control border-0 bg-white py-2" placeholder="Enter password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary-custom w-100 py-3 shadow mb-3 fs-5">Sign In <i class="bi bi-arrow-right ms-2"></i></button>
          <div class="text-center mt-3 text-muted fw-semibold">
            New to MBSTU STORE? <a href="#" class="text-primary text-decoration-none" onclick="toggleAuthMode()">Create an account</a>
          </div>
          <div class="text-center mt-4 small p-3 bg-white rounded-3 shadow-sm text-start border-start border-4 border-primary">
            <i class="bi bi-info-circle me-1 text-primary"></i> Admin Portal: <strong>admin / password</strong><br/>
            <i class="bi bi-bag me-1 mt-1 d-inline-block text-primary"></i> Store Access: <strong>user / password</strong>
          </div>
        </form>
      </div>

      <div id="register-form-container" style="display: none;">
        <form onsubmit="register(event)">
          <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <input type="text" id="reg-username" class="form-control bg-white shadow-sm border-0 py-2" placeholder="Choose a username" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" id="reg-password" class="form-control bg-white shadow-sm border-0 py-2" placeholder="Choose a password" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Account Role</label>
            <select id="reg-role" class="form-select bg-white shadow-sm border-0 py-2">
              <option value="customer">Shopper</option>
              <option value="admin">Store Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary-custom w-100 py-3 shadow mb-3 fs-5">Register Now <i class="bi bi-person-plus ms-2"></i></button>
          <div class="text-center mt-3 text-muted fw-semibold">
            Already registered? <a href="#" class="text-primary text-decoration-none" onclick="toggleAuthMode()">Log in here</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      if(user) window.location.href = user.role === 'admin' ? 'admin.html' : 'shop.html';
    });
  </script>
</body>
</html>
