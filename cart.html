<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Summary | MBSTU STORE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;"></div>

  <!-- Global Glass Navbar (Identical structure to shop) -->
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="shop.html">
        <i class="bi bi-hexagon-fill text-primary me-2"></i> MBSTU STORE.
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-3">
          <li class="nav-item"><a class="nav-link" href="shop.html">Discover</a></li>
          <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          
          <li class="nav-item d-flex align-items-center px-3 border-start py-1">
            <a href="cart.html" class="position-relative text-primary ms-2 text-decoration-none">
              <i class="bi bi-bag-fill fs-5"></i>
              <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-white" style="font-size: 0.6rem;">0</span>
            </a>
          </li>
          
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-dark fw-bold d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle fs-5 me-2"></i> <span id="nav-username"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm mt-2" style="border-radius: 12px;">
              <li><a class="dropdown-item fw-semibold py-2" href="profile.html"><i class="bi bi-person-gear me-2"></i> Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item text-danger fw-bold py-2" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Sign Out</button></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Body -->
  <div class="container py-5 fade-in mb-5" style="min-height: 60vh;">
    <h2 class="fw-bolder mb-4 text-dark" style="letter-spacing: -1px;">Review Your Cart</h2>
    
    <div class="row gy-4">
      <div class="col-lg-8">
        <div class="table-responsive table-custom border-0 p-3">
          <table class="table mb-0 border-0">
            <thead>
              <tr>
                <th class="border-0">Product Details</th>
                <th class="border-0">Price</th>
                <th class="border-0">Quantity</th>
                <th class="border-0">Total</th>
                <th class="border-0"></th>
              </tr>
            </thead>
            <tbody id="cart-container" class="border-top-0">
              <!-- JS Loaded -->
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- Summary Sidebar -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded" style="background-color: var(--glass-bg); border: 1px solid rgba(0,0,0,0.05) !important; border-radius: 20px !important;">
          <div class="card-body p-4 p-md-5">
            <h5 class="fw-bolder mb-4">Order Summary</h5>
            
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted fw-semibold">Subtotal</span>
              <span class="fw-bolder text-dark">৳<span id="cart-total">0.00</span></span>
            </div>
            
            <div class="d-flex justify-content-between mb-4 pb-4 border-bottom">
              <span class="text-muted fw-semibold">Express Shipping</span>
              <span class="badge bg-success-subtle text-success fw-bold px-2 py-1">FREE</span>
            </div>
            
            <div class="d-flex justify-content-between mb-4 align-items-center">
              <span class="fw-bold text-uppercase text-muted" style="letter-spacing: 1px; font-size: 0.85rem;">Grand Total</span>
              <span class="fw-bolder fs-3 text-primary">৳<span id="cart-total-final">0.00</span></span>
            </div>
            
            <button class="btn btn-primary-custom w-100 py-3 fs-5 shadow mt-2" onclick="checkout()"><i class="bi bi-box-arrow-right me-2"></i> Place Order</button>
            <p class="text-center mt-3 small text-muted"><i class="bi bi-info-circle"></i> No payment is required at this step.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Commercial Footer -->
  <footer class="commercial-footer">
    <div class="container"><p class="text-center text-muted small fw-semibold">&copy; 2026 MBSTU STORE. All rights reserved.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.onload = function() {
      checkAccess('customer');
      renderCart();
      const observer = new MutationObserver(() => {
        document.getElementById('cart-total-final').textContent = document.getElementById('cart-total').textContent;
      });
      observer.observe(document.getElementById('cart-total'), { childList: true });
      document.getElementById('cart-total-final').textContent = document.getElementById('cart-total').textContent;
    }
  </script>
</body>
</html>
