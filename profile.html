<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile | MBSTU STORE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f8fafc;">
  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;"></div>

  <nav class="navbar navbar-expand-lg navbar-custom sticky-top border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="shop.html">
        <i class="bi bi-hexagon-fill text-primary me-2"></i> MBSTU STORE.
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-3">
          <li class="nav-item"><a class="nav-link" href="shop.html">Discover</a></li>
          <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item d-flex align-items-center px-3 border-start py-1">
            <a href="cart.html" class="position-relative text-dark ms-2 text-decoration-none">
              <i class="bi bi-bag fs-5"></i>
              <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-white" style="font-size: 0.6rem;">0</span>
            </a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-dark fw-bold d-flex align-items-center active" href="#" role="button" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle fs-5 me-2"></i> <span id="nav-username"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm mt-2" style="border-radius: 12px;">
              <li><a class="dropdown-item fw-semibold py-2 active" href="profile.html"><i class="bi bi-person-gear me-2"></i> Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item text-danger fw-bold py-2" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Sign Out</button></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5 fade-in min-vh-100">
    <div class="row g-4">
      
      <!-- Sidebar Profile -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 text-center p-4">
          <div class="position-relative mx-auto mb-3" style="width: 120px; height: 120px;">
            <img src="https://via.placeholder.com/150/2563eb/ffffff?text=User" alt="Profile" class="rounded-circle w-100 h-100 object-fit-cover shadow-sm border border-4 border-white">
            <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 shadow" style="width: 32px; height: 32px;"><i class="bi bi-pencil-fill small"></i></button>
          </div>
          <h4 class="fw-bolder mb-1" id="profile-name">Loading...</h4>
          <p class="text-muted small fw-semibold text-uppercase mb-3"><i class="bi bi-patch-check-fill text-primary"></i> Premium Member</p>
          <div class="d-grid gap-2 mt-4">
            <button class="btn btn-light fw-bold text-start border"><i class="bi bi-person-lines-fill me-2"></i> Account Details</button>
            <button class="btn btn-light fw-bold text-start border" onclick="window.location.href='orders.html'"><i class="bi bi-box-seam me-2"></i> My Orders</button>
            <button class="btn btn-light fw-bold text-danger text-start border" onclick="logout()"><i class="bi bi-box-arrow-left me-2"></i> Sign out</button>
          </div>
        </div>
      </div>

      <!-- Main Content Tabs -->
      <div class="col-lg-8">
        <ul class="nav nav-pills mb-4 gap-2 bg-white p-2 rounded-4 shadow-sm" id="profile-tabs" role="tablist">
          <li class="nav-item flex-sm-fill" role="presentation">
            <button class="nav-link active w-100 fw-bold rounded-3 py-2" data-bs-toggle="pill" data-bs-target="#settings-tab" type="button" role="tab"><i class="bi bi-sliders me-2"></i> Settings</button>
          </li>
          <li class="nav-item flex-sm-fill" role="presentation">
            <button class="nav-link w-100 fw-bold rounded-3 py-2" data-bs-toggle="pill" data-bs-target="#wishlist-tab" type="button" role="tab" onclick="renderWishlist()"><i class="bi bi-heart-fill me-2"></i> Wishlist</button>
          </li>
        </ul>

        <div class="tab-content" id="profile-tabs-content">
          <!-- Settings View -->
          <div class="tab-pane fade show active" id="settings-tab" role="tabpanel">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
              <h5 class="fw-bolder mb-4">Personal Information</h5>
              <form onsubmit="saveProfile(event)">
                <div class="row g-4">
                  <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold text-uppercase">Username</label>
                    <input type="text" class="form-control bg-light border-0 py-2 fw-semibold" id="setting-username" readonly disabled>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold text-uppercase">Email Address</label>
                    <input type="email" class="form-control bg-light border-0 py-2 fw-semibold" id="setting-email" placeholder="user@example.com">
                  </div>
                  <div class="col-12">
                    <label class="form-label text-muted small fw-bold text-uppercase">Shipping Address</label>
                    <input type="text" class="form-control bg-light border-0 py-2 fw-semibold" id="setting-address" placeholder="123 Main St, City, Country">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold text-uppercase">Change Password</label>
                    <input type="password" class="form-control bg-light border-0 py-2 fw-semibold" id="setting-password" placeholder="Leave blank to keep same">
                  </div>
                  <div class="col-12 mt-4 pt-2 border-top">
                    <button type="submit" class="btn btn-primary-custom px-4 py-2 shadow-sm">Save Changes</button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <!-- Wishlist View -->
          <div class="tab-pane fade" id="wishlist-tab" role="tabpanel">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
              <h5 class="fw-bolder mb-4">Saved Products</h5>
              <div class="row g-4" id="wishlist-container">
                <!-- Rendered via JS -->
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer class="commercial-footer border-top bg-white mt-auto">
    <div class="container text-center py-4">
      <p class="text-muted small fw-semibold mb-0">&copy; 2026 MBSTU STORE Commercial Edition. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.onload = function() {
      checkAccess('customer');
      const user = getCurrentUser();
      if(user) {
        document.getElementById('profile-name').textContent = user.username;
        document.getElementById('setting-username').value = user.username;
        document.getElementById('setting-email').value = user.email || '';
        document.getElementById('setting-address').value = user.address || '';
      }
    }
  </script>
</body>
</html>
